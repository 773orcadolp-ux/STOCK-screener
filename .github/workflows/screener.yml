name: Stock Screener

on:
  schedule:
    - cron: '0 0 * * 1-5'   # JST 09:00
    - cron: '0 3 * * 1-5'   # JST 12:00
    - cron: '0 6 * * 1-5'   # JST 15:00
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt   # ← scripts/ に合わせた

      - name: Run screener
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python scripts/screener.py                # ← scripts/ に合わせた


      - name: Commit and push results
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ docs/
          git diff --staged --quiet || git commit -m "Update screening results [$(date '+%Y-%m-%d %H:%M') JST]"
          git push
