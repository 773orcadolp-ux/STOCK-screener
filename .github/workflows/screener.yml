name: Stock Screener

on:
  schedule:
    # 平日（月〜金）の日本時間 9:00, 12:00, 15:00 に実行
    # GitHub ActionsはUTC基準 → JST-9時間
    - cron: '0 0 * * 1-5'   # JST 09:00
    - cron: '0 3 * * 1-5'   # JST 12:00
    - cron: '0 6 * * 1-5'   # JST 15:00
  workflow_dispatch:          # 手動実行ボタンも有効化

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # docs/ への書き込みに必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r screener/requirements.txt

      - name: Run screener
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
        run: python screener/screen.py

      - name: Generate HTML report
        run: python screener/generate_html.py

      - name: Commit and push results
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ docs/
          git diff --staged --quiet || git commit -m "Update screening results [$(date '+%Y-%m-%d %H:%M') JST]"
          git push
